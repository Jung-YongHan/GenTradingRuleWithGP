apiVersion: v1
kind: Pod
metadata:
  name: redis
spec:
  containers:
  - name: redis
    image: redis:7.2.3
    command:
      - redis-server
      - "/redis-master/redis.conf"
    env:
    - name: MASTER
      value: "true"
    ports:
    - containerPort: 6379
    volumeMounts:
    - mountPath: /data/redis-master-data
      name: data
    - mountPath: /data/redis-master
      name: config
  volumes:
    - name: data
      hostPath:
        path: /data/redis_volume
        type: DirectoryOrCreate
    - name: config
      configMap:
        name: redis-config
        items:
        - key: redis-config
          path: redis.conf
